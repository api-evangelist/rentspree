aid: rentspree
name: RentSpree
description: >-
  RentSpree is a Los Angeles-headquartered rental real estate technology
  platform that streamlines the long-tail rental transaction for real estate
  agents, landlords, property managers, and renters. Its consumer-facing
  product suite covers online rental applications, TransUnion-powered tenant
  screening (credit, background, eviction, and income verification), e-sign
  and lease workflows, ACH/card rent payments, AI-assisted listing pages and
  syndication, rent estimate, and renters insurance. RentSpree positions
  itself as the rental layer for the MLS and brokerage ecosystem and has
  built named integrations with Multiple Listing Services (Bright MLS,
  CRMLS, Beaches MLS, CJMLS, Florida Realtors) and PropTech partners
  (SkySlope, Lone Wolf, ZipLogix, C.A.R. OnlineEd). It also runs an
  Enterprise API Integration program for MLSs, associations, brokerages,
  and PropTech vendors that want to embed rental application intake and
  tenant screening into their own platforms — documentation is not
  publicly published; partners are onboarded through a sales/integration
  process with implementation quoted at as little as three weeks. There
  is no self-serve developer portal, no public OpenAPI specification, and
  no public SDK or CLI; the RentSpree GitHub org is effectively empty
  (only a .github org-defaults repo). RentSpree is SOC 2 Type II certified
  and reports more than four million agents, landlords, and renters on
  the platform.
